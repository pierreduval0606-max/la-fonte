  function calcMacros(foodId, grams) {
    const f = FOOD_DB.find(x => x.id === foodId); if (!f) return { p: 0, c: 0, f: 0 };
    const ratio = grams / 100;
    return { p: Math.round(f.p * ratio), c: Math.round(f.c * ratio), f: Math.round(f.f * ratio) };
  }


  // ── v5: Session (Gym/Run) blocks ──────────────────────────────────────
  // Anchors: meal label → offset (minutes) from session start.
  // Sat (dow=6) is rest day — no session.
  const SESSION_DEFAULTS = {
    0: { label: 'Gym (evening)', startHHMM: '19:30', durationMin: 90, anchors: { 'Pre-gym': -30, 'Post-gym shake': 120 } },
    1: { label: 'Gym',           startHHMM: '09:00', durationMin: 90, anchors: { 'Pre-gym': -90, 'Post-gym shake': 95, 'Breakfast': 120 } },
    2: { label: 'Run',           startHHMM: '09:00', durationMin: 60, anchors: { 'Pre-run': -75, 'Post-run recovery': 90, 'Breakfast': 150 } },
    3: { label: 'Gym',           startHHMM: '09:00', durationMin: 90, anchors: { 'Pre-gym': -90, 'Post-gym shake': 95, 'Breakfast': 120 } },
    4: { label: 'Gym',           startHHMM: '09:00', durationMin: 90, anchors: { 'Pre-gym': -90, 'Post-gym shake': 95, 'Breakfast': 120 } },
    5: { label: 'Run',           startHHMM: '09:00', durationMin: 60, anchors: { 'Pre-run': -75, 'Post-run recovery': 90, 'Breakfast': 150 } },
    6: null
  };
  function _hhmmToMin(s) {
    const m = String(s || '').match(/^(\d{1,2}):(\d{2})/);
    return m ? parseInt(m[1], 10) * 60 + parseInt(m[2], 10) : 0;
  }
  function _minToHhmm(m) {
    m = ((m % 1440) + 1440) % 1440;
    return Math.floor(m / 60) + ':' + String(m % 60).padStart(2, '0');
  }
  function loadSessionStart(dateKey, dow) {
    const stored = loadJSON('session_start_v1:' + dateKey, null);
    if (stored) return stored;
    const def = SESSION_DEFAULTS[dow];
    return def ? def.startHHMM : null;
  }
  function saveSessionStart(dateKey, hhmm) { saveJSON('session_start_v1:' + dateKey, hhmm); }
  function resetSessionStart(dateKey) { try { localStorage.removeItem('session_start_v1:' + dateKey); } catch {} }
  function getSessionAnchorMin(mealLabel, dow) {
    const def = SESSION_DEFAULTS[dow];
    if (!def || !def.anchors) return null;
    return Object.prototype.hasOwnProperty.call(def.anchors, mealLabel) ? def.anchors[mealLabel] : null;
  }
  // Resolve a meal's actual display time given session start + global shift
  function resolveMealTime(meal, dateKey, dow, globalShiftHours) {
    const offset = getSessionAnchorMin(meal.label, dow);
    if (offset != null) {
      const ss = loadSessionStart(dateKey, dow);
      if (ss) return _minToHhmm(_hhmmToMin(ss) + offset + (globalShiftHours || 0) * 60);
    }
    return shiftMealTime(meal.time, globalShiftHours || 0);
  }
  function buildSessionBlock(dateKey, dow, globalShiftHours) {
    const def = SESSION_DEFAULTS[dow];
    if (!def) return null;
    const ss = loadSessionStart(dateKey, dow) || def.startHHMM;
    const startMin = _hhmmToMin(ss) + (globalShiftHours || 0) * 60;
    const endMin = startMin + def.durationMin;
    const userOverride = loadJSON('session_start_v1:' + dateKey, null) != null;
    return {
      kind: 'session',
      label: def.label,
      startTime: _minToHhmm(startMin),
      endTime: _minToHhmm(endMin),
      sortMin: startMin,
      isCustom: userOverride
    };
  }
  function openSessionTimeModal(dateKey, dow, onSave) {
    const def = SESSION_DEFAULTS[dow];
    if (!def) return;
    const titleEl = document.getElementById('modalTitle');
    const bodyEl  = document.getElementById('modalBody');
    titleEl.textContent = 'Adjust ' + def.label;
    const cur = loadSessionStart(dateKey, dow) || def.startHHMM;
    const curHHMM = (cur.length === 4) ? '0' + cur : (cur.length < 5 ? '0' + cur : cur);
    const padded = (s) => { const m = s.match(/^(\d{1,2}):(\d{2})/); return m ? String(m[1]).padStart(2,'0') + ':' + m[2] : s; };
    const inputVal = padded(cur);
    bodyEl.innerHTML =
      '<div class="session-modal-row"><label>Start at</label><input type="time" id="sessStart" value="' + inputVal + '" /></div>' +
      '<div style="font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.5">Default: ' + def.startHHMM + ' · duration ' + def.durationMin + ' min. ' +
      'Pre/post meals shift relative to your session.</div>' +
      '<div style="display:flex;gap:8px">' +
        '<button class="btn-action" id="cancelSess" style="flex:1">Cancel</button>' +
        (loadJSON('session_start_v1:' + dateKey, null) != null ? '<button class="btn-action" id="resetSess" style="flex:1">Reset</button>' : '') +
        '<button class="btn-action primary" id="saveSess" style="flex:2">Save</button>' +
      '</div>';
    function close() { document.getElementById('modal').classList.remove('show'); }
    document.getElementById('modal').classList.add('show');
    document.getElementById('modalClose').onclick = close;
    document.getElementById('cancelSess').onclick = close;
    const resetBtn = document.getElementById('resetSess');
    if (resetBtn) resetBtn.onclick = () => { resetSessionStart(dateKey); close(); if (onSave) onSave(); };
    document.getElementById('saveSess').onclick = () => {
      const inp = document.getElementById('sessStart');
      const v = inp.value || def.startHHMM;
      saveSessionStart(dateKey, v);
      close(); if (onSave) onSave();
    };
  }

  // ── v3: Meal override / swap modal ────────────────────────────────────
  function openMealOverrideModal(meal, dateKey, onSave) {
    const titleEl = document.getElementById('modalTitle');
    const bodyEl  = document.getElementById('modalBody');
    titleEl.textContent = meal.label;
    const notes = migrateNotes(loadProteinNotes(dateKey));
    const cur   = notes[meal.id] || { text: meal.detail, p: meal.p, c: meal.c, f: meal.f };
    let activeTab  = 'pick';
    let pickedFood = FOOD_DB[0].id;
    let pickedGrams = 150;
    let custText = cur.text, custP = cur.p, custC = cur.c, custF = cur.f;

    function render() {
      const calc = calcMacros(pickedFood, pickedGrams);
      const food = FOOD_DB.find(f => f.id === pickedFood);
      const optsHTML = FOOD_DB.map(f => '<option value="' + f.id + '"' + (f.id===pickedFood?' selected':'') + '>' + f.name + '</option>').join('');
      const safeText = (custText||'').replace(/"/g,'&quot;');
      const tabPick = activeTab === 'pick';
      bodyEl.innerHTML =
        '<div class="food-tab-row">' +
          '<button class="food-tab ' + (tabPick?'on':'') + '" data-ft="pick">Food picker</button>' +
          '<button class="food-tab ' + (!tabPick?'on':'') + '" data-ft="custom">Custom</button>' +
        '</div>' +
        (tabPick ?
          '<div class="food-picker">' +
            '<div class="food-picker-row"><label>Food</label><select id="foodSel">' + optsHTML + '</select></div>' +
            '<div class="food-picker-row"><label>Grams</label><input type="number" id="foodGrams" min="1" max="2000" step="5" value="' + pickedGrams + '" /></div>' +
            '<div class="food-calc"><div class="food-calc-row">' +
              '<div class="food-calc-cell"><span class="food-calc-num">' + calc.p + '</span><span class="food-calc-lbl">Protein</span></div>' +
              '<div class="food-calc-cell"><span class="food-calc-num">' + calc.c + '</span><span class="food-calc-lbl">Carbs</span></div>' +
              '<div class="food-calc-cell"><span class="food-calc-num">' + calc.f + '</span><span class="food-calc-lbl">Fat</span></div>' +
            '</div></div>' +
            '<div style="font-size:10px;color:var(--muted);margin-top:8px;text-align:center">' + pickedGrams + 'g · ' + food.name + '</div>' +
          '</div>'
          :
          '<div class="food-picker">' +
            '<div class="food-picker-row" style="flex-direction:column;align-items:stretch"><label style="margin-bottom:4px">What you ate</label><input type="text" id="custText" value="' + safeText + '" /></div>' +
            '<div class="food-picker-row"><label>Protein</label><input type="number" id="custP" min="0" max="500" value="' + custP + '" /></div>' +
            '<div class="food-picker-row"><label>Carbs</label><input type="number" id="custC" min="0" max="500" value="' + custC + '" /></div>' +
            '<div class="food-picker-row"><label>Fat</label><input type="number" id="custF" min="0" max="500" value="' + custF + '" /></div>' +
          '</div>'
        ) +
        '<div style="display:flex;gap:8px;margin-top:14px">' +
          '<button class="btn-action" id="cancelOver" style="flex:1">Cancel</button>' +
          (notes[meal.id] ? '<button class="btn-action" id="clearOver" style="flex:1">Reset</button>' : '') +
          '<button class="btn-action primary" id="saveOver" style="flex:2">Save</button>' +
        '</div>';

      bodyEl.querySelectorAll('.food-tab').forEach(b => b.addEventListener('click', () => { activeTab = b.dataset.ft; render(); }));
      const sel = document.getElementById('foodSel');
      const gr  = document.getElementById('foodGrams');
      if (sel) sel.addEventListener('change', () => { pickedFood = sel.value; render(); });
      if (gr)  gr.addEventListener('input', () => { pickedGrams = Math.max(1, parseInt(gr.value, 10) || 0); render(); });
      const ct = document.getElementById('custText'); if (ct) ct.addEventListener('input', () => { custText = ct.value; });
      const cp = document.getElementById('custP'); if (cp) cp.addEventListener('input', () => { custP = parseInt(cp.value,10)||0; });
      const cc = document.getElementById('custC'); if (cc) cc.addEventListener('input', () => { custC = parseInt(cc.value,10)||0; });
      const cf = document.getElementById('custF'); if (cf) cf.addEventListener('input', () => { custF = parseInt(cf.value,10)||0; });
      document.getElementById('cancelOver').addEventListener('click', closeMealModal);
      const clearBtn = document.getElementById('clearOver');
      if (clearBtn) clearBtn.addEventListener('click', () => {
        const n = migrateNotes(loadProteinNotes(dateKey)); delete n[meal.id]; saveProteinNotes(dateKey, n);
        closeMealModal(); if (onSave) onSave();
      });
      document.getElementById('saveOver').addEventListener('click', () => {
        const n = migrateNotes(loadProteinNotes(dateKey));
        if (activeTab === 'pick') {
          const c2 = calcMacros(pickedFood, pickedGrams);
          const food2 = FOOD_DB.find(f => f.id === pickedFood);
          n[meal.id] = { text: pickedGrams + 'g · ' + food2.name, p: c2.p, c: c2.c, f: c2.f };
        } else {
          n[meal.id] = { text: (custText || meal.detail).trim(), p: custP|0, c: custC|0, f: custF|0 };
        }
        saveProteinNotes(dateKey, n);
        closeMealModal(); if (onSave) onSave();
      });
    }
    function closeMealModal() { document.getElementById('modal').classList.remove('show'); }
    document.getElementById('modal').classList.add('show');
    document.getElementById('modalClose').onclick = closeMealModal;
    render();
  }

  // ── Midnight date refresh ─────────────────────────────────────────────────
  function scheduleMidnightRefresh() {
    const now = new Date();
    const msUntilMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1) - now;
    setTimeout(() => {
      document.getElementById('date').textContent = fmtDate();
      scheduleMidnightRefresh(); // reschedule for the next midnight
    }, msUntilMidnight);
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  document.querySelectorAll('.day-tab').forEach(tab => tab.addEventListener('click', () => switchDay(tab.dataset.day)));

  // ── v3: Splash + mode routing ─────────────────────────────────────────
  const APP_EL = document.getElementById('app');
  function setAppMode(mode) {
    APP_EL.dataset.mode = mode;
    document.getElementById('backSplashBtn').style.display = (mode === 'splash') ? 'none' : 'inline-block';
    if (mode === 'splash') {
      stopRestChrono();
      try { localStorage.removeItem('lafonte_mode'); } catch {}
    } else {
      try { localStorage.setItem('lafonte_mode', mode); } catch {}
      if (mode === 'gym') {
        if (currentDay === 'protein') currentDay = 'upper';
        switchDay(currentDay);
      } else if (mode === 'diet') {
        switchDay('protein');
      }
    }
  }
  document.querySelectorAll('[data-pick-mode]').forEach(c => {
    c.addEventListener('click', () => setAppMode(c.dataset.pickMode));
  });
  document.getElementById('backSplashBtn').addEventListener('click', () => setAppMode('splash'));
  try {
    const saved = localStorage.getItem('lafonte_mode');
    if (saved === 'gym' || saved === 'diet') {
      setTimeout(() => setAppMode(saved), 0);
    }
  } catch {}
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
  document.getElementById('date').textContent = fmtDate();
  scheduleMidnightRefresh();

  initLibrary();
  dayList = loadDayList(currentDay);
  session = loadSession(currentDay);
  if (session._startedAt) startChrono();
  renderTrainingDay();
})();
</script>

</body>
</html>
