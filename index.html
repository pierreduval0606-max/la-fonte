<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>La Fonte</title>

  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="La Fonte">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%230a0a0a'/%3E%3Ctext x='256' y='340' font-family='Times New Roman' font-style='italic' font-size='260' fill='%23d4ff3a' text-anchor='middle'%3ELf%3C/text%3E%3C/svg%3E">

  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1c1c1c;
      --border: #262626;
      --text: #f5f5f5;
      --muted: #8a8a8a;
      --accent: #d4ff3a;
      --accent-dim: #8fa827;
      --done: #22c55e;
      --danger: #ef4444;
      --bonus: #60a5fa;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }
    html, body { -webkit-font-smoothing: antialiased; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      min-height: 100vh;
      font-feature-settings: 'ss01', 'ss02';
    }

    .app { max-width: 520px; margin: 0 auto; padding: calc(16px + var(--safe-top)) 14px calc(120px + var(--safe-bottom)); position: relative; }

    .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }

    .logo { font-family: 'Times New Roman', serif; font-size: 30px; font-weight: 400; letter-spacing: -0.02em; font-style: italic; }
    .logo::first-letter { color: var(--accent); }

    .tagline { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.2em; font-family: 'SF Mono', ui-monospace, monospace; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }

    .date { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; font-family: 'SF Mono', ui-monospace, monospace; }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .chrono { font-size: 10px; color: var(--accent); font-family: 'SF Mono', ui-monospace, monospace; letter-spacing: 0.1em; display: none; }
    .chrono.active { display: block; }

    .day-tabs {
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 3px; margin-bottom: 20px;
      background: var(--surface); padding: 4px; border-radius: 14px; border: 1px solid var(--border);
      position: sticky; top: var(--safe-top); z-index: 50;
    }
    .day-tab { padding: 14px 2px; border: none; background: transparent; color: var(--muted); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; border-radius: 10px; cursor: pointer; transition: all 0.15s; font-family: inherit; min-height: 48px; }
    .day-tab.active { background: var(--accent); color: #000; }
    .day-tab.history-tab.active { background: var(--bonus); color: #000; }
    .day-tab.protein-tab.active { background: var(--done); color: #000; }

    .session-banner { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .session-banner-left { flex: 1; min-width: 0; }
    .session-banner .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-banner .progress { font-family: 'SF Mono', ui-monospace, monospace; font-size: 16px; font-weight: 700; }
    .session-banner .progress .done-count { color: var(--accent); }
    .session-banner .progress .pct { font-size: 11px; color: var(--muted); font-weight: 600; margin-left: 6px; }
    .rest-chrono { font-size: 10px; color: var(--muted); font-family: 'SF Mono', ui-monospace, monospace; letter-spacing: 0.1em; margin-top: 3px; min-height: 18px; transition: color 0.2s, font-size 0.2s; }
    .rest-chrono.active { color: var(--accent); font-size: 14px; font-weight: 800; letter-spacing: 0.04em; }
    .rest-chrono.ready { color: var(--done, #22c55e); font-size: 14px; font-weight: 800; animation: restPulse 0.6s ease-in-out 3; }
    @keyframes restPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
    .pr-badge { background: linear-gradient(135deg, #d4ff3a, #b8e62a) !important; color: #000 !important; font-weight: 800; box-shadow: 0 0 0 1px rgba(212,255,58,0.3); }
    .rest-config { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding: 10px 12px; background: var(--surface-2); border-radius: 10px; }
    .rest-config-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; flex: 1; }
    .rest-config select { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-family: inherit; font-size: 13px; min-height: 36px; }
    .d-subtabs { display: flex; gap: 4px; padding: 4px; background: var(--surface); border-radius: 10px; margin-bottom: 14px; }
    .d-subtab { flex: 1; padding: 10px 4px; background: none; border: none; color: var(--muted); font-size: 11px; font-family: inherit; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; border-radius: 7px; cursor: pointer; min-height: 40px; }
    .d-subtab.on { background: var(--surface-2); color: var(--text); }
    .d-day-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .d-day-type { font-size: 16px; font-weight: 700; }
    .d-day-date { font-size: 12px; color: var(--muted); font-family: 'SF Mono', ui-monospace, monospace; }
    .d-coach-tip { background: var(--surface-2); border-left: 3px solid var(--accent); border-radius: 8px; padding: 10px 12px; margin: 10px 0; font-size: 13px; color: var(--text); line-height: 1.5; }
    .d-coach-tip-label { font-size: 9px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; margin-bottom: 3px; }
    .d-mac-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 14px 12px; margin: 12px 0; }
    .d-mac-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; font-size: 12px; }
    .d-mac-label { width: 42px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; font-size: 10px; }
    .d-mac-bar { flex: 1; height: 7px; background: var(--surface-2); border-radius: 4px; overflow: hidden; }
    .d-mac-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
    .d-mac-fill.c { background: #f4a261; }
    .d-mac-fill.f { background: #a892d4; }
    .d-mac-num { font-size: 11px; color: var(--text); min-width: 70px; text-align: right; font-family: 'SF Mono', ui-monospace, monospace; font-weight: 700; }
    .d-meals { margin-top: 12px; }
    .d-meal { display: flex; gap: 10px; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; cursor: pointer; }
    .d-meal.done { background: var(--surface-2); border-color: var(--accent); }
    .d-meal.over { border-left: 3px solid #f4a261; }
    .d-meal-time { font-size: 10px; color: var(--muted); font-family: 'SF Mono', ui-monospace, monospace; min-width: 36px; padding-top: 2px; font-weight: 700; }
    .d-meal-body { flex: 1; min-width: 0; }
    .d-meal-name { font-size: 13px; font-weight: 700; color: var(--text); }
    .d-meal-detail { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.45; }
    .d-meal-carb { font-size: 10px; color: #f4a261; margin-top: 4px; line-height: 1.4; }
    .d-meal-mac { font-size: 11px; color: var(--accent); margin-top: 4px; font-family: 'SF Mono', ui-monospace, monospace; font-weight: 700; letter-spacing: 0.02em; }
    .d-meal-actions { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
    .d-meal-check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 14px; color: transparent; font-weight: 700; }
    .d-meal.done .d-meal-check { background: var(--accent); border-color: var(--accent); color: #000; }
    .d-meal-edit { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); padding: 4px 8px; font-size: 11px; cursor: pointer; font-family: inherit; min-height: 28px; }
    .d-week-summary { font-size: 12px; color: var(--muted); padding: 10px 12px; background: var(--surface-2); border-radius: 8px; margin-bottom: 10px; line-height: 1.5; }
    .d-week-summary b { color: var(--text); font-weight: 700; }
    .d-week-row { display: grid; grid-template-columns: 50px 1fr auto; gap: 10px; align-items: center; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; }
    .d-week-row.on { border-color: var(--accent); background: var(--surface-2); }
    .d-week-day { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .d-week-row.on .d-week-day { color: var(--accent); }
    .d-week-type { font-size: 12px; color: var(--text); font-weight: 600; }
    .d-week-mac { display: flex; gap: 6px; font-size: 10px; font-family: 'SF Mono', ui-monospace, monospace; color: var(--text); font-weight: 700; }
    .d-week-mac span { background: var(--surface-2); padding: 3px 6px; border-radius: 4px; }
    .d-shop-intro { font-size: 12px; color: var(--muted); padding: 10px 12px; background: var(--surface-2); border-radius: 8px; margin-bottom: 12px; line-height: 1.5; }
    .d-shop-cat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
    .d-shop-cat-name { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; margin-bottom: 8px; }
    .d-shop-item { font-size: 12px; color: var(--text); padding: 5px 0; border-top: 1px solid var(--border); }
    .d-shop-item:first-of-type { border-top: none; }
    .d-rule { display: flex; gap: 12px; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; }
    .d-rule-num { font-size: 18px; font-weight: 800; color: var(--accent); font-family: 'SF Mono', ui-monospace, monospace; min-width: 28px; }
    .d-rule-body { flex: 1; }
    .d-rule-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .d-rule-text { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .d-avoid-card { background: #2a1414; border: 1px solid #4a2020; border-radius: 10px; padding: 14px; margin-top: 14px; }
    .d-avoid-title { font-size: 11px; color: #d47878; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; margin-bottom: 10px; }
    .d-avoid-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .d-avoid-chip { background: #1a0c0c; border: 1px solid #4a2020; color: #d47878; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: capitalize; }
    .d-avoid-note { font-size: 11px; color: #d47878; margin-top: 10px; line-height: 1.5; opacity: 0.85; }
    .rest-skip { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 4px 10px; font-size: 11px; font-family: inherit; cursor: pointer; margin-left: 8px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* Protein tracker */
    .protein-header { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
    .protein-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 6px; }
    .protein-progress { font-family: 'SF Mono', ui-monospace, monospace; font-size: 22px; font-weight: 800; }
    .protein-progress .prot-done { color: var(--done); }
    .protein-bar-wrap { height: 6px; background: var(--border); border-radius: 3px; margin-top: 10px; overflow: hidden; }
    .protein-bar { height: 100%; background: var(--done); border-radius: 3px; transition: width 0.3s; }
    .protein-bar.over { background: var(--accent); }
    .meal-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.15s; }
    .meal-card.checked { border-color: var(--done); background: rgba(34,197,94,0.06); }
    .meal-check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; font-weight: 800; transition: all 0.15s; }
    .meal-card.checked .meal-check { background: var(--done); border-color: var(--done); color: #000; }
    .meal-info { flex: 1; min-width: 0; }
    .meal-time { font-size: 10px; color: var(--muted); font-family: 'SF Mono', ui-monospace, monospace; letter-spacing: 0.1em; }
    .meal-name { font-size: 14px; font-weight: 700; margin: 2px 0; }
    .meal-detail { font-size: 11px; color: var(--muted); line-height: 1.4; }
    .meal-prot { font-family: 'SF Mono', ui-monospace, monospace; font-size: 15px; font-weight: 800; color: var(--done); flex-shrink: 0; }
    .meal-card.checked .meal-prot { opacity: 0.5; }
    .meal-prot.overridden { color: var(--accent); opacity: 1 !important; }
    .meal-override-note { font-size: 10px; color: var(--accent-dim); margin-top: 3px; font-style: italic; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
    .meal-edit-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); width: 30px; height: 30px; border-radius: 8px; font-size: 13px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: inherit; transition: all 0.15s; margin-left: 4px; }
    .meal-edit-btn:active { background: var(--surface-2); color: var(--accent); border-color: var(--accent); transform: scale(0.94); }
    .meal-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
    .meal-prot-planned { font-family: 'SF Mono', ui-monospace, monospace; font-size: 10px; color: var(--muted); text-decoration: line-through; }

    .btn-finish { background: transparent; border: 1.5px solid var(--border); color: var(--muted); padding: 10px 14px; border-radius: 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; font-family: inherit; font-weight: 700; min-height: 44px; white-space: nowrap; flex-shrink: 0; transition: all 0.15s; }
    .btn-finish:active { background: var(--surface-2); color: var(--accent); border-color: var(--accent); transform: scale(0.96); }

    .exercise { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; margin-bottom: 12px; overflow: hidden; transition: border-color 0.2s; position: relative; }
    .exercise.complete { border-color: var(--done); }
    .exercise.bonus { border-left: 3px solid var(--bonus); }

    .ex-order { position: absolute; top: 12px; left: 14px; font-size: 10px; color: var(--muted); font-family: 'SF Mono', ui-monospace, monospace; letter-spacing: 0.1em; font-weight: 700; }

    .ex-header { padding: 16px 14px 16px 42px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; gap: 10px; min-height: 68px; }
    .ex-title-wrap { flex: 1; min-width: 0; }
    .ex-title { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 3px 0; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .tag { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 6px; border-radius: 5px; background: var(--bonus); color: #000; }
    .ex-last { font-size: 12px; color: var(--muted); font-family: 'SF Mono', ui-monospace, monospace; }
    /* Last performance line under the subtitle */
    .ex-last-perf { font-size: 11px; color: var(--accent-dim); font-family: 'SF Mono', ui-monospace, monospace; margin-top: 2px; }

    .ex-status { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .set-pills { display: flex; gap: 4px; }
    .pill { width: 9px; height: 9px; border-radius: 50%; background: var(--border); transition: all 0.15s; }
    .pill.done { background: var(--accent); }
    /* Text fallback when there are too many pills to show */
    .pill-count { font-family: 'SF Mono', ui-monospace, monospace; font-size: 11px; font-weight: 800; color: var(--muted); }
    .pill-count.all-done { color: var(--accent); }

    .chevron { color: var(--muted); font-size: 16px; font-family: 'SF Mono', ui-monospace, monospace; font-weight: 700; transition: transform 0.2s; display: inline-block; }
    .exercise.open .chevron { transform: rotate(180deg); }

    .ex-body { display: none; padding: 0 14px 16px; border-top: 1px solid var(--border); }
    .exercise.open .ex-body { display: block; }

    .ex-note-box { background: var(--surface-2); border-radius: 10px; padding: 9px 12px; margin-top: 12px; font-size: 12px; color: #a0a0a0; line-height: 1.5; border-left: 2px solid var(--accent-dim); }

    .weight-row { display: flex; align-items: center; gap: 10px; margin: 12px 0 4px; }
    .weight-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; margin-right: auto; font-weight: 700; }
    .weight-input { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 14px 12px; border-radius: 12px; font-size: 20px; font-weight: 700; font-family: 'SF Mono', ui-monospace, monospace; width: 110px; text-align: center; min-height: 52px; }
    .weight-input:focus { outline: none; border-color: var(--accent); }
    .weight-unit { color: var(--muted); font-size: 14px; font-family: 'SF Mono', ui-monospace, monospace; font-weight: 600; }

    .sets-stepper { display: flex; align-items: center; gap: 12px; margin: 10px 0 4px; }
    .stepper-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; font-weight: 700; margin-right: auto; }
    .stepper-btn { background: var(--surface-2); border: 1.5px solid var(--border); color: var(--text); width: 44px; height: 44px; border-radius: 10px; font-size: 22px; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; line-height: 1; }
    /* FIX: was :active, now :active:not(:disabled) to prevent flash on disabled state */
    .stepper-btn:active:not(:disabled) { background: var(--accent); color: #000; border-color: var(--accent); transform: scale(0.94); }
    .stepper-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .stepper-value { font-family: 'SF Mono', ui-monospace, monospace; font-size: 22px; font-weight: 800; min-width: 28px; text-align: center; }

    .notes-input { width: 100%; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 12px 14px; border-radius: 10px; font-size: 14px; font-family: inherit; margin-top: 10px; min-height: 48px; }
    .notes-input:focus { outline: none; border-color: var(--accent); }

    .sets { display: grid; gap: 8px; margin-top: 14px; }

    .set-btn { background: var(--surface-2); border: 1.5px solid var(--border); border-radius: 14px; padding: 18px 6px; cursor: pointer; transition: all 0.15s; font-family: inherit; color: var(--text); display: flex; flex-direction: column; align-items: center; gap: 4px; min-height: 80px; }
    .set-btn .set-num { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; font-weight: 700; }
    .set-btn .reps { font-size: 26px; font-weight: 800; font-family: 'SF Mono', ui-monospace, monospace; letter-spacing: -0.02em; line-height: 1; }
    .set-btn .reps-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; font-weight: 700; }
    .set-btn .set-weight-info { font-size: 9px; color: var(--muted); font-family: 'SF Mono', ui-monospace, monospace; font-weight: 700; margin-top: 1px; }
    .set-btn.done { background: var(--accent); border-color: var(--accent); color: #000; }
    .set-btn.done .set-num, .set-btn.done .reps-label { color: rgba(0,0,0,0.6); }
    .set-btn.done .set-weight-info { color: rgba(0,0,0,0.55); }
    .set-btn:active { transform: scale(0.94); opacity: 0.85; }

    .sets-instruction { margin-top: 14px; padding: 10px 12px; background: rgba(212,255,58,0.08); border: 1px solid rgba(212,255,58,0.25); border-radius: 10px; font-size: 11px; color: var(--accent); text-align: center; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; }

    .set-btn-entering { background: var(--surface-2); border: 2px solid var(--accent); border-radius: 14px; padding: 8px 4px; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
    .set-btn-entering .set-num { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; }
    .set-input-row { display: flex; align-items: baseline; gap: 2px; justify-content: center; }
    .set-rep-input, .set-weight-input { background: transparent; border: none; color: var(--accent); font-size: 18px; font-weight: 800; font-family: 'SF Mono', ui-monospace, monospace; text-align: center; padding: 2px 0; line-height: 1; -webkit-user-select: text; user-select: text; }

    catch { return fallback; }
  }

    try {

      console.error(e);
      // FIX: surface storage-full errors to the user instead of silently failing
      if (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED') {
        toast('⚠ Storage full — export your data now!', 'error');

  function setAudio(on) { _audioOn = on; try { localStorage.setItem('audio_v1', String(on)); } catch {} }
  let _ac = null;
  function _ctx() {
    if (_audioOn === false) return null;
    try { if (!_ac || _ac.state === 'closed') _ac = new (window.AudioContext || window.webkitAudioContext)(); }
    catch { return null; }
    if (_ac.state === 'suspended') _ac.resume().catch(() => {});
    return _ac;
  }
  function _tone(freq, dur, type, vol, when) {
    const ac = _ctx(); if (!ac) return;
    try {
      const t0 = ac.currentTime + (when || 0);
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t0);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(vol || 0.4, t0 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g); g.connect(ac.destination);
      o.start(t0); o.stop(t0 + dur + 0.05);
    } catch(e) {}
  }
  function _sweep(f1, f2, dur, type, vol, when) {
    const ac = _ctx(); if (!ac) return;
    try {
      const t0 = ac.currentTime + (when || 0);
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = type || 'sine';
      o.frequency.setValueAtTime(f1, t0);
      o.frequency.exponentialRampToValueAtTime(Math.max(20, f2), t0 + dur);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(vol || 0.3, t0 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g); g.connect(ac.destination);
      o.start(t0); o.stop(t0 + dur + 0.05);
    } catch(e) {}
  }

      try { window.speechSynthesis.cancel(); } catch {}

      u.rate = (opts && opts.rate) || 1.0;
      u.pitch = (opts && opts.pitch) || 1.0;
      u.volume = (opts && opts.volume) || 1.0;

  // ── Volume calculation ─────────────────────────────────────────────────────
  function calcVolume(exercises) {
    let vol = 0;
    const isLogged = v => v !== null && v !== undefined;
    exercises.forEach(ex => {
      const sets = ex.unilateral
        ? [...(ex.setsLeft||[]).filter(isLogged), ...(ex.setsRight||[]).filter(isLogged)]
        : (ex.sets||[]).filter(isLogged);
      sets.forEach(s => { if (s && typeof s === 'object' && s.reps && s.weight) vol += s.reps * s.weight; });
    });
    return Math.round(vol);
  }

  // ── PR detection (Epley estimated 1RM) ────────────────────────────────────
  function _epley(s) {
    if (!s || typeof s !== 'object' || s.weight == null || s.reps == null) return 0;
    return s.weight * (1 + s.reps / 30);
  }
  function _bestSet(arr) {
    let best = null;
    (arr || []).forEach(s => {
      const score = _epley(s);
      if (score > 0 && (!best || score > best.score)) best = { reps: s.reps, weight: s.weight, score };
    });
    return best;
  }
  function getPersonalBest(exId, historyCache) {
    let best = null;
    historyCache.forEach(sess => {
      sess.exercises.forEach(ex => {
        if (ex.id !== exId) return;
        const candidates = [_bestSet(ex.sets), _bestSet(ex.setsLeft), _bestSet(ex.setsRight)];
        candidates.forEach(c => { if (c && (!best || c.score > best.score)) best = c; });
      });
    });
    return best;
  }
  function getSessionBest(sdata, lib) {
    if (lib.unilateral) {
      const l = _bestSet(sdata.setsLeft), r = _bestSet(sdata.setsRight);
      if (!l && !r) return null;
      return (l && (!r || l.score > r.score)) ? l : r;
    }
    return _bestSet(sdata.sets);
  }

  // ── Last performance lookup ───────────────────────────────────────────────
  function getLastPerfText(exId, historyCache) {
    const isLogged = v => v !== null && v !== undefined;
    for (let i = historyCache.length - 1; i >= 0; i--) {
      const ex = historyCache[i].exercises.find(e => e.id === exId);
      if (!ex) continue;
      if (ex.unilateral) {
        const l = (ex.setsLeft  || []).filter(isLogged);
        const r = (ex.setsRight || []).filter(isLogged);
        if (!l.length && !r.length) continue;
        const last = l[l.length - 1];
        const info = (last && typeof last === 'object') ? ` · ${last.reps}r @ ${last.weight}kg` : '';
        return `Last: ${l.length}L / ${r.length}R sets${info}`;
      } else {
        const logged = (ex.sets || []).filter(isLogged);
        if (!logged.length) continue;
        const last = logged[logged.length - 1];
        const info = (last && typeof last === 'object') ? ` · ${last.reps}r @ ${last.weight}kg` : '';
        return `Last: ${logged.length} sets${info}`;
      }
    }
    return null;
  }

  // Returns true when ALL sets in the last logged session for this exercise
  // hit the upper bound of targetReps (e.g. "10-12" → 12), signalling it's
  // time to bump the weight up.
  function shouldBumpWeight(exId, historyCache, targetReps) {
    const match = String(targetReps || '').match(/(\d+)\s*$/);
    if (!match) return false;
    const upper = parseInt(match[1]);
    const isLogged = v => v !== null && v !== undefined;
    for (let i = historyCache.length - 1; i >= 0; i--) {
      const ex = historyCache[i].exercises.find(e => e.id === exId);
      if (!ex) continue;
      const allSets = ex.unilateral
        ? [...(ex.setsLeft||[]), ...(ex.setsRight||[])].filter(isLogged)
        : (ex.sets||[]).filter(isLogged);
      if (!allSets.length) continue;
      return allSets.every(s => (typeof s === 'object' ? s.reps : s) >= upper);
    }
    return false;
  }

  // ── Session helpers ───────────────────────────────────────────────────────
  function hasAnyLoggedSets() {
    for (const id of dayList) {
      const lib = getLib(id); if (!lib) continue;
      const sdata = session[id]; if (!sdata) continue;
      if (lib.unilateral) {
        if ((sdata.setsLeft  || []).some(v => v !== null && v !== undefined)) return true;
        if ((sdata.setsRight || []).some(v => v !== null && v !== undefined)) return true;
      } else {
        if ((sdata.sets || []).some(v => v !== null && v !== undefined)) return true;
      }
    }
    return false;
  }

  function snapshotSession() {
    const snapshot = {
      id: Date.now().toString(),
      day: currentDay, dayLabel: DAY_LABELS[currentDay],
      date: new Date().toISOString(),
      // SESSION DURATION: computed from when first set was logged
      duration: session._startedAt ? Math.round((Date.now() - session._startedAt) / 60000) : null,
      exercises: []
    };
    for (const id of dayList) {
      const lib = getLib(id); if (!lib) continue;
      const sdata = session[id]; if (!sdata) continue;
      let hasData = lib.unilateral
        ? (sdata.setsLeft  || []).some(v => v !== null && v !== undefined) || (sdata.setsRight || []).some(v => v !== null && v !== undefined)
        : (sdata.sets || []).some(v => v !== null && v !== undefined);
      if (!hasData) continue;
      const exSnap = { id: lib.id, name: lib.name, weight: sdata.weight, notes: sdata.notes || '', unilateral: !!lib.unilateral };
      if (lib.unilateral) { exSnap.setsLeft = [...(sdata.setsLeft||[])]; exSnap.setsRight = [...(sdata.setsRight||[])]; }
      else { exSnap.sets = [...(sdata.sets||[])]; }
      snapshot.exercises.push(exSnap);
    }
    return snapshot;
  }

  function updateProgress() {
    let total = 0, done = 0;
    for (const id of dayList) {
      const lib = getLib(id); if (!lib) continue;
      const sdata = session[id];
      if (!sdata) { total += (lib.sets ?? DEFAULT_SETS) * (lib.unilateral ? 2 : 1); continue; }
      if (lib.unilateral) {
        total += (sdata.setsLeft?.length ?? 0) + (sdata.setsRight?.length ?? 0);
        done  += (sdata.setsLeft  || []).filter(v => v !== null && v !== undefined).length;
        done  += (sdata.setsRight || []).filter(v => v !== null && v !== undefined).length;
      } else {
        total += sdata.sets?.length ?? 0;
        done  += (sdata.sets || []).filter(v => v !== null && v !== undefined).length;
      }
    }
    const doneEl  = document.getElementById('setsDone');
    const totalEl = document.getElementById('setsTotal');
    const pctEl   = document.getElementById('sessionPct');
    if (doneEl)  doneEl.textContent  = done;
    if (totalEl) totalEl.textContent = total;
    if (pctEl)   pctEl.textContent   = total > 0 ? `${Math.round(done / total * 100)}%` : '0%';
  }

  function isBonus(id) {
    const lib = getLib(id); if (!lib) return false;
    return !DAY_NATIVE_GROUPS[currentDay].includes(lib.group);
  }

  // ── Render training day ───────────────────────────────────────────────────
  function renderTrainingDay() {
    const root = document.getElementById('mainContent');
    root.innerHTML = `
      <div class="session-banner">
        <div class="session-banner-left">
          <div class="label">${DAY_LABELS[currentDay]}</div>
          <div class="progress"><span class="done-count" id="setsDone">0</span><span style="color:var(--muted)"> / <span id="setsTotal">0</span> sets</span><span class="pct" id="sessionPct">0%</span></div>
          <div class="rest-chrono" id="restChrono"></div>
        </div>
        <button class="btn-finish" id="finishBtn">Finish / Save</button>
      </div>
      <div id="exercises"></div>
      <button class="btn-add" id="addBtn">+ Add exercise</button>
    `;
    renderExercises();
    document.getElementById('finishBtn').addEventListener('click', finishSession);
    document.getElementById('addBtn').addEventListener('click', openAddModal);
  }

  function renderExercises() {
    // Load history once per render pass for last-performance lookup
    const historyCache = loadHistory();
    const container = document.getElementById('exercises');
    container.innerHTML = '';
    const isPillDone = v => v !== null && v !== undefined;

    // Renders a row of pills, or "done/total" text if too many to fit
    const renderPillsRow = (arr) => {
      if (arr.length <= MAX_PILLS) {
        return arr.map(v => `<div class="pill ${isPillDone(v) ? 'done' : ''}"></div>`).join('');
      }
      const done = arr.filter(isPillDone).length;
      return `<span class="pill-count ${done === arr.length ? 'all-done' : ''}">${done}/${arr.length}</span>`;
    };

    dayList.forEach((exId, idx) => {
      const lib = getLib(exId); if (!lib) return;

      let sdata = session[exId];
      if (!sdata) {
        const n = lib.sets ?? DEFAULT_SETS;
        sdata = { weight: lib.weight, notes: '', currentReps: 10, currentSide: 'L', setsCount: n };
        if (lib.unilateral) { sdata.setsLeft = Array(n).fill(null); sdata.setsRight = Array(n).fill(null); }
        else                { sdata.sets = Array(n).fill(null); }
        session[exId] = sdata;
      }
      // Migration for sessions saved before setsCount existed
      if (sdata.setsCount === undefined) {
        sdata.setsCount = lib.unilateral
          ? Math.max(sdata.setsLeft?.length ?? 0, sdata.setsRight?.length ?? 0)
          : (sdata.sets?.length ?? lib.sets ?? DEFAULT_SETS);
      }

      const setsCount = getSetsCount(lib, sdata);

      let doneCount, totalSets;
      if (lib.unilateral) {
        doneCount = sdata.setsLeft.filter(isPillDone).length + sdata.setsRight.filter(isPillDone).length;
        totalSets = setsCount * 2;
      } else {
        doneCount = sdata.sets.filter(isPillDone).length;
        totalSets = setsCount;
      }
      const isComplete = doneCount === totalSets;
      const bonus = isBonus(exId);

      const card = document.createElement('div');
      card.className = 'exercise' + (isComplete ? ' complete' : '') + (bonus ? ' bonus' : '');
      card.dataset.id = exId;

      let tagsHTML = '';
      if (bonus)          tagsHTML += `<span class="tag">+${GROUP_LABELS[lib.group]}</span>`;
      if (lib.unilateral) tagsHTML += `<span class="tag" style="background:var(--bonus)">SINGLE</span>`;

      const gridCols = `grid-template-columns:repeat(${setsCount},1fr)`;

      const renderSetBtn = (v, i) => {
        const hasData = v !== null && v !== undefined;
        const reps    = hasData ? (typeof v === 'object' ? v.reps : v) : null;
        const w       = hasData && typeof v === 'object' ? v.weight : null;
        return `
          <button class="set-btn ${hasData ? 'done' : ''}" data-set="${i}">
            <span class="set-num">Set ${i+1}</span>
            <span class="reps">${hasData ? reps : '-'}</span>
            ${hasData && w !== null ? `<span class="set-weight-info">${w} kg</span>` : `<span class="reps-label">reps</span>`}
          </button>`;
      };

      let setsHTML;
      if (lib.unilateral) {
        const active     = sdata.currentSide || 'L';
        const activeSets = active === 'L' ? sdata.setsLeft : sdata.setsRight;
        setsHTML = `
          <div class="unilateral-row">
            <span>Active side</span>
            <div class="side-toggle">
              <button class="side-btn ${active==='L'?'active':''}" data-side="L">Left</button>
              <button class="side-btn ${active==='R'?'active':''}" data-side="R">Right</button>
            </div>
          </div>
          <div class="sets" style="${gridCols}">${activeSets.map(renderSetBtn).join('')}</div>`;
      } else {
        setsHTML = `<div class="sets" style="${gridCols}">${sdata.sets.map(renderSetBtn).join('')}</div>`;
      }

      const setsLabel = `<span style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:0.15em;font-weight:700;margin-top:2px">sets</span>`;
      let pillsHTML;
      if (lib.unilateral) {
        pillsHTML = `<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
          <div class="set-pills">${renderPillsRow(sdata.setsLeft)}</div>
          <div class="set-pills">${renderPillsRow(sdata.setsRight)}</div>
          ${setsLabel}
        </div>`;
      } else {
        pillsHTML = `<div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px"><div class="set-pills">${renderPillsRow(sdata.sets)}</div>${setsLabel}</div>`;
      }

      // FIX: show last session's performance instead of just current defaults
      const lastPerf  = getLastPerfText(exId, historyCache);
      const bumpNudge = shouldBumpWeight(exId, historyCache, lib.targetReps);
      const pb        = getPersonalBest(exId, historyCache);
      const sb        = getSessionBest(sdata, lib);
      const isPR      = sb && (!pb || sb.score > pb.score + 0.01);
      const prBadge   = isPR ? `<span class="tag pr-badge">PR ↑ ${sb.weight}kg × ${sb.reps}</span>` : '';
      const restSec   = lib.restSec || 90;

      card.innerHTML = `
        <div class="ex-order">${String(idx+1).padStart(2,'0')}</div>
        <div class="ex-header">
          <div class="ex-title-wrap">
            <h3 class="ex-title">${lib.name}${tagsHTML}${prBadge}${bumpNudge ? '<span class="tag" style="background:var(--done);color:#000;margin-left:2px">⬆ bump</span>' : ''}</h3>
            <div class="ex-last">${sdata.weight} kg · ${lib.targetReps} reps · ${setsCount} sets</div>
            ${lastPerf ? `<div class="ex-last-perf">${lastPerf}</div>` : ''}
          </div>
          <div class="ex-status">${pillsHTML}<span class="chevron">v</span></div>
        </div>
        <div class="ex-body">
          ${lib.note ? `<div class="ex-note-box">${lib.note}</div>` : ''}
          <div class="weight-row">
            <span class="weight-label">Weight</span>
            <input type="number" class="weight-input" data-role="weight" value="${sdata.weight}" step="0.25" inputmode="decimal" pattern="[0-9]*">
            <span class="weight-unit">kg</span>
          </div>
          <div class="sets-stepper">
            <span class="stepper-label">Sets</span>
            <button class="stepper-btn" data-role="sets-minus" ${setsCount<=1?'disabled':''}>−</button>
            <span class="stepper-value">${setsCount}</span>
            <button class="stepper-btn" data-role="sets-plus"  ${setsCount>=8?'disabled':''}>+</button>
          </div>
          <div class="rest-config">
            <span class="rest-config-label">Rest after set</span>
            <select data-role="rest">
              ${[60,90,120,180].map(s => `<option value="${s}" ${restSec===s?'selected':''}>${s<60?s+'s':(Math.floor(s/60)+(s%60?':'+String(s%60).padStart(2,'0'):' min'))}</option>`).join('')}
            </select>
          </div>
          <div class="sets-instruction">Tap a set · enter reps × weight</div>
          ${setsHTML}
          <input type="text" class="notes-input" data-role="notes" placeholder="Notes (feel, form, PR, level)" value="${sdata.notes||''}">
          <button class="btn-remove" data-role="remove">Remove from today</button>
        </div>`;

      attachExerciseHandlers(card, lib, sdata, exId, setsCount);
      container.appendChild(card);
    });

    updateProgress();
  }

  function attachExerciseHandlers(card, lib, sdata, exId, setsCount) {
    card.querySelector('.ex-header').addEventListener('click', () => {
      document.querySelectorAll('.exercise.open').forEach(c => { if (c !== card) c.classList.remove('open'); });
      card.classList.toggle('open');
    });

    const wInput = card.querySelector('[data-role="weight"]');
    wInput.addEventListener('click', e => e.stopPropagation());
    wInput.addEventListener('change', () => {
      const val = parseFloat(wInput.value);
      if (!isNaN(val)) {
        sdata.weight = val;
        lib.weight   = val;
        library = library.map(x => x.id === lib.id ? { ...x, weight: val } : x);
        saveJSON('library_v6', library);
        saveSession();
        // FIX: use sdata.setsCount (not stale closure variable) so the subtitle stays accurate
        card.querySelector('.ex-last').textContent = `${val} kg · ${lib.targetReps} reps · ${sdata.setsCount} sets`;
      }
    });

    const nInput = card.querySelector('[data-role="notes"]');
    nInput.addEventListener('click', e => e.stopPropagation());
    nInput.addEventListener('change', () => { sdata.notes = nInput.value; saveSession(); });

    if (lib.unilateral) {
      card.querySelectorAll('.side-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          sdata.currentSide = btn.dataset.side;
          saveSession();
          renderExercises();
          const reopen = document.querySelector(`.exercise[data-id="${exId}"]`);
          if (reopen) reopen.classList.add('open');
        });
      });
    }

    card.querySelectorAll('.set-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const setIdx    = parseInt(btn.dataset.set);
        const targetArr = lib.unilateral ? (sdata.currentSide === 'L' ? sdata.setsLeft : sdata.setsRight) : sdata.sets;

        // Already logged → clear
        if (targetArr[setIdx] !== null && targetArr[setIdx] !== undefined) {
          targetArr[setIdx] = null;
          saveSession();
          haptic();
          renderExercises();
          const reopen = document.querySelector(`.exercise[data-id="${exId}"]`);
          if (reopen) reopen.classList.add('open');
          toast('Set cleared');
          return;
        }

        // Suggest from previous set
        let suggestedReps   = sdata.currentReps ?? 10;
        let suggestedWeight = sdata.weight;
        for (let j = setIdx - 1; j >= 0; j--) {
          const prev = targetArr[j];
          if (prev !== null && prev !== undefined) {
            if (typeof prev === 'object') { suggestedReps = prev.reps; suggestedWeight = prev.weight; }
            else { suggestedReps = prev; }
            break;
          }
        }

        btn.classList.add('set-btn-entering');
        btn.innerHTML = `
          <span class="set-num">Set ${setIdx+1}</span>
          <div class="set-input-row">
            <input type="number" class="set-rep-input"    inputmode="numeric" pattern="[0-9]*" value="${suggestedReps}">
            <span class="set-input-sep">x</span>
            <input type="number" class="set-weight-input" inputmode="decimal" step="0.25"      value="${suggestedWeight}">
            <span class="set-input-unit">kg</span>
          </div>`;

        const repInput    = btn.querySelector('.set-rep-input');
        const weightInput = btn.querySelector('.set-weight-input');
        repInput.focus(); repInput.select();

        let committed = false;

        const commit = () => {
          if (committed) return; committed = true;
          const reps   = parseInt(repInput.value.trim());
          const weight = parseFloat(weightInput.value.trim());
          if (isNaN(reps) || reps < 1 || isNaN(weight) || weight < 0) {
            renderExercises();
            const reopen = document.querySelector(`.exercise[data-id="${exId}"]`);
            if (reopen) reopen.classList.add('open');
            return;
          }
          targetArr[setIdx]  = { reps, weight };
          sdata.currentReps  = reps;
          sdata.weight       = weight;
          lib.weight         = weight;
          library = library.map(x => x.id === lib.id ? { ...x, weight } : x);
          saveJSON('library_v6', library);
          // SESSION DURATION: mark when first set is logged
          if (!session._startedAt) {
            session._startedAt = Date.now();
            const t = new Date(session._startedAt);
            const hh = String(t.getHours()).padStart(2, '0');
            const mm = String(t.getMinutes()).padStart(2, '0');
            toast(`⏱ Session started at ${hh}:${mm}`);
            startChrono();
          }
          saveSession();
          haptic();
          startRestChrono(lib.restSec || 90);
          renderExercises();
          const reopen = document.querySelector(`.exercise[data-id="${exId}"]`);
          if (reopen) reopen.classList.add('open');
          const sideLabel = lib.unilateral ? ` (${sdata.currentSide === 'L' ? 'Left' : 'Right'})` : '';
          toast(`Set ${setIdx+1}${sideLabel}: ${reps} reps at ${weight} kg`);
        };

        const stopProp    = ev => ev.stopPropagation();
        const handleEnter = ev => {
          if (ev.key !== 'Enter') return;
          ev.preventDefault();
          if (document.activeElement === repInput) { weightInput.focus(); weightInput.select(); }
          else { weightInput.blur(); }
        };
        repInput.addEventListener('click', stopProp);
        weightInput.addEventListener('click', stopProp);
        repInput.addEventListener('keydown', handleEnter);
        weightInput.addEventListener('keydown', handleEnter);
        const handleBlur = () => {
          setTimeout(() => {
            if (document.activeElement !== repInput && document.activeElement !== weightInput) commit();
          }, 50);
        };
        repInput.addEventListener('blur', handleBlur);
        weightInput.addEventListener('blur', handleBlur);
      });
    });

    // Sets stepper
    card.querySelector('[data-role="sets-minus"]').addEventListener('click', e => {
      e.stopPropagation();
      if (sdata.setsCount <= 1) { toast('Minimum 1 set'); return; }
      const lastIdx = sdata.setsCount - 1;
      const doRemove = () => {
        if (lib.unilateral) { sdata.setsLeft.pop(); sdata.setsRight.pop(); }
        else { sdata.sets.pop(); }
        sdata.setsCount--;
        saveSession();
        renderExercises();
        const reopen = document.querySelector(`.exercise[data-id="${exId}"]`);
        if (reopen) reopen.classList.add('open');
        toast(`${sdata.setsCount} set${sdata.setsCount !== 1 ? 's' : ''}`);
      };
      let hasData = false;
      if (lib.unilateral) {
        const lv = sdata.setsLeft[lastIdx], rv = sdata.setsRight[lastIdx];
        hasData = (lv !== null && lv !== undefined) || (rv !== null && rv !== undefined);
      } else {
        const v = sdata.sets[lastIdx];
        hasData = v !== null && v !== undefined;
      }
      if (hasData) { confirmModal('Remove set', 'Last set has logged data. Remove it?', doRemove); }
      else { doRemove(); }
    });

    card.querySelector('[data-role="sets-plus"]').addEventListener('click', e => {
      e.stopPropagation();
      if (sdata.setsCount >= 8) { toast('Maximum 8 sets'); return; }
      if (lib.unilateral) { sdata.setsLeft.push(null); sdata.setsRight.push(null); }
      else { sdata.sets.push(null); }
      sdata.setsCount++;
      saveSession();
      renderExercises();
      const reopen = document.querySelector(`.exercise[data-id="${exId}"]`);
      if (reopen) reopen.classList.add('open');
      toast(`${sdata.setsCount} sets`);
    });

    // Remove exercise
    const restSel = card.querySelector('[data-role="rest"]');
    if (restSel) {
      restSel.addEventListener('click', e => e.stopPropagation());
      restSel.addEventListener('change', () => {
        const v = parseInt(restSel.value, 10);
        if (!isNaN(v)) {
          lib.restSec = v;
          library = library.map(x => x.id === lib.id ? { ...x, restSec: v } : x);
          saveJSON('library_v6', library);
          toast(`Rest set to ${v}s`);
        }
      });
    }

        card.querySelector('[data-role="remove"]').addEventListener('click', e => {
      e.stopPropagation();
      confirmModal('Remove exercise', `Remove "${lib.name}" from today's session?`, () => {
        dayList = dayList.filter(id => id !== exId);
        delete session[exId];
        saveDayList(currentDay);
        saveSession();
        renderExercises();
        toast('Removed');
      });
    });
  }

  // ── Finish / save session ─────────────────────────────────────────────────
  function finishSession() {
    if (!hasAnyLoggedSets()) {
      confirmModal('Reset day', 'No sets logged. Reset the day without saving?', () => {
        for (const id of Object.keys(session)) {
          if (id.startsWith('_')) continue;
          const lib = getLib(id); if (!lib) continue;
          const n = session[id].setsCount ?? lib.sets ?? DEFAULT_SETS;
          if (lib.unilateral) { session[id].setsLeft = Array(n).fill(null); session[id].setsRight = Array(n).fill(null); }
          else { session[id].sets = Array(n).fill(null); }
        }
        delete session._startedAt;
        stopChrono(); stopRestChrono();
        saveSession(); renderExercises(); toast('Day reset');
      });
      return;
    }

    confirmModal('Save session', `Save this ${DAY_LABELS[currentDay]} session and start fresh?`, () => {
      const snap    = snapshotSession();
      const history = loadHistory();
      history.push(snap);
      saveHistory(history);

      for (const id of Object.keys(session)) {
        if (id.startsWith('_')) continue;
        const lib = getLib(id); if (!lib) continue;
        const n = session[id].setsCount ?? lib.sets ?? DEFAULT_SETS;
        if (lib.unilateral) { session[id].setsLeft = Array(n).fill(null); session[id].setsRight = Array(n).fill(null); }
        else { session[id].sets = Array(n).fill(null); }
      }
      delete session._startedAt;
      stopChrono(); stopRestChrono();
      saveSession(); renderExercises(); toast('Session saved ✓');
    });
  }

  // ── History ───────────────────────────────────────────────────────────────
  function renderHistory() {
    const history = loadHistory();
    const root    = document.getElementById('mainContent');

    if (history.length === 0) {
      root.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">LOG</div>
          <div>No sessions logged yet.<br>Finish a session and it will show up here.</div>
        </div>`;
      return;
    }

    const isLogged  = v => v !== null && v !== undefined;
    const totalSets = history.reduce((sum, s) => sum + s.exercises.reduce((es, ex) => {
      if (ex.unilateral) return es + (ex.setsLeft||[]).filter(isLogged).length + (ex.setsRight||[]).filter(isLogged).length;
      return es + (ex.sets||[]).filter(isLogged).length;
    }, 0), 0);

    const firstDate = new Date(history[0].date);
    const lastDate  = new Date(history[history.length-1].date);
    const daysSpan  = Math.max(1, Math.ceil((lastDate - firstDate) / (1000*60*60*24)) + 1);
    // FIX: show "—" when we don't yet have a full week of data (was showing 7.0 on day 1)
    const sessionsPerWeek = daysSpan < 7 ? '—' : (history.length / daysSpan * 7).toFixed(1);

    const byMonth = {};
    history.slice().reverse().forEach(s => {
      const key = fmtMonthKey(s.date);
      if (!byMonth[key]) byMonth[key] = [];
      byMonth[key].push(s);
    });

    let monthsHTML = '';
    Object.entries(byMonth).forEach(([month, sessions], idx) => {
      monthsHTML += `
        <div class="history-month ${idx===0?'open':''}" data-month="${month}">
          <div class="history-month-header">
            <div class="history-month-title">${month}</div>
            <div class="history-month-count">${sessions.length} session${sessions.length!==1?'s':''}</div>
          </div>
          <div class="history-month-body">${sessions.map(renderHistorySessionCard).join('')}</div>
        </div>`;
    });

    root.innerHTML = `
      <div class="history-actions">
        <button class="btn-action primary" id="shareClaudeBtn">Share with Claude</button>
        <button class="btn-action" id="exportBtn">Export data</button>
      </div>
      <div class="history-stats">
        <div class="stat"><span class="stat-num">${history.length}</span><div class="stat-label">Sessions</div></div>
        <div class="stat"><span class="stat-num">${totalSets}</span><div class="stat-label">Sets logged</div></div>
        <div class="stat"><span class="stat-num">${sessionsPerWeek}</span><div class="stat-label">Avg / week</div></div>
      </div>
      ${monthsHTML}`;

    document.querySelectorAll('.history-month-header').forEach(h => {
      h.addEventListener('click', () => h.parentElement.classList.toggle('open'));
    });
    document.querySelectorAll('.history-session').forEach(s => {
      s.addEventListener('click', () => s.classList.toggle('open'));
    });
    // Delete session buttons
    document.querySelectorAll('.session-delete-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const sid = btn.dataset.sessionId;
        confirmModal('Delete session', 'Remove this session from history? This cannot be undone.', () => {
          const h = loadHistory().filter(s => s.id !== sid);
          saveHistory(h);
          renderHistory();
          toast('Session deleted');
        });
      });
    });
    document.getElementById('exportBtn').addEventListener('click', openExportModal);
    document.getElementById('shareClaudeBtn').addEventListener('click', openShareModal);
  }

  function renderHistorySessionCard(s) {
    const isLogged  = v => v !== null && v !== undefined;
    const formatSet = v => typeof v === 'object' ? `${v.reps} × ${v.weight}kg` : `${v} reps`;

    const totalSetsLogged = s.exercises.reduce((sum, ex) => {
      if (ex.unilateral) return sum + (ex.setsLeft||[]).filter(isLogged).length + (ex.setsRight||[]).filter(isLogged).length;
      return sum + (ex.sets||[]).filter(isLogged).length;
    }, 0);

    // VOLUME tracking in session card
    const vol = calcVolume(s.exercises);
    const dur = s.duration ? fmtDuration(s.duration) : null;
    const summaryParts = [];
    if (dur) summaryParts.push(dur);
    summaryParts.push(`${s.exercises.length} exercises`);
    summaryParts.push(`${totalSetsLogged} sets`);
    if (vol > 0) summaryParts.push(fmtVol(vol));

    let detailsHTML = '';
    s.exercises.forEach(ex => {
      if (ex.unilateral) {
        const l = (ex.setsLeft||[]).filter(isLogged);
        const r = (ex.setsRight||[]).filter(isLogged);
        detailsHTML += `<div style="margin-bottom:10px">
          <div class="history-ex-name">${ex.name}</div>
          <div class="history-ex-sets">Left: ${l.length ? l.map(formatSet).join(', ') : '—'}</div>
          <div class="history-ex-sets">Right: ${r.length ? r.map(formatSet).join(', ') : '—'}</div>
          ${ex.notes ? `<div class="history-ex-sets" style="font-style:italic">${ex.notes}</div>` : ''}
        </div>`;
      } else {
        const logged = (ex.sets||[]).filter(isLogged);
        detailsHTML += `<div style="margin-bottom:10px">
          <div class="history-ex-name">${ex.name}</div>
          <div class="history-ex-sets">${logged.length ? logged.map(formatSet).join(', ') : '—'}</div>
          ${ex.notes ? `<div class="history-ex-sets" style="font-style:italic">${ex.notes}</div>` : ''}
        </div>`;
      }
    });

    return `
      <div class="history-session" data-session-id="${s.id}">
        <div class="history-session-header">
          <div class="history-session-day">${s.dayLabel}</div>
          <div class="history-session-meta">
            <div class="history-session-date">${fmtDateFull(s.date)}</div>
            <button class="session-delete-btn" data-session-id="${s.id}">×</button>
          </div>
        </div>
        <div class="history-session-summary">${summaryParts.join(' · ')}</div>
        <div class="history-session-details">${detailsHTML}</div>
      </div>`;
  }

  // ── Export / Share ────────────────────────────────────────────────────────
  function buildClaudeShareText(history) {
    if (history.length === 0) return 'No sessions in this date range.';
    const isLogged  = v => v !== null && v !== undefined;
    const formatSet = v => typeof v === 'object' ? `${v.reps} reps @ ${v.weight}kg` : `${v} reps`;
    const firstDate = new Date(history[0].date);
    const lastDate  = new Date(history[history.length-1].date);

    let text = `# La Fonte — Training log\n\n`;
    text += `Hi Claude, here is my training data from ${firstDate.toLocaleDateString()} to ${lastDate.toLocaleDateString()}. Please review progression, form/effort notes, and flag anything worth adjusting.\n\n`;
    text += `Context: 3 years training, ~107 kg, 18.6% body fat (InBody). Left leg ~3% behind right. Program: Upper 1×, Leg A (both legs) 1×, Leg B (single leg) 1×, Back 1× weekly.\n\n`;
    text += `Sessions: ${history.length}  |  Range: ${firstDate.toLocaleDateString()} – ${lastDate.toLocaleDateString()}\n\n---\n\n`;

    history.forEach(s => {
      const vol = calcVolume(s.exercises);
      const dur = s.duration ? fmtDuration(s.duration) : null;
      text += `## ${s.dayLabel} — ${fmtDateFull(s.date)}\n`;
      const meta = [];
      if (dur) meta.push(`Duration: ${dur}`);
      if (vol > 0) meta.push(`Volume: ${fmtVol(vol)}`);
      if (meta.length) text += meta.join('  |  ') + '\n';
      text += '\n';
      s.exercises.forEach(ex => {
        if (ex.unilateral) {
          const l = (ex.setsLeft||[]).filter(isLogged);
          const r = (ex.setsRight||[]).filter(isLogged);
          text += `- ${ex.name}\n`;
          text += `  - Left:  ${l.length ? l.map(formatSet).join(', ') : '—'}\n`;
          text += `  - Right: ${r.length ? r.map(formatSet).join(', ') : '—'}\n`;
          if (ex.notes) text += `  - Note: ${ex.notes}\n`;
        } else {
          const logged = (ex.sets||[]).filter(isLogged);
          text += `- ${ex.name}: ${logged.length ? logged.map(formatSet).join(', ') : '—'}\n`;
          if (ex.notes) text += `  - Note: ${ex.notes}\n`;
        }
      });
      text += '\n';
    });

    text += `---\n\nQuestions:\n1. Where am I progressing well?\n2. Where am I stalling, and what should I change?\n3. Any form, volume, or frequency adjustments for the next month?\n`;
    return text;
  }

      date: dateKey,

      meals: plan.meals.map(m => ({

    const history = loadDietHistory();

  // ── Smart protein parser ──────────────────────────────────────────────────
  // Recognises: "45g protein", "ate 40g prot", "chicken 200g + 2 eggs", etc.
  function parseProteinFromText(text) {
    if (!text || !text.trim()) return null;
    const t = text.toLowerCase();

    // 1. Direct mention: "45g protein", "protein 45", "45 prot"
    let m = t.match(/(\d+(?:\.\d+)?)\s*g?\s*(?:protein|prot(?:eine?)?)\b/) ||
            t.match(/(?:protein|prot(?:eine?)?)\s*[:\-]?\s*(\d+(?:\.\d+)?)/);
    if (m) return Math.round(parseFloat(m[1]));

    // 2. Food-based parsing — common foods with protein per 100g
    const FOODS = [
      { k: ['skyr','quark'], p: 10 },
      { k: ['cottage'], p: 11 },
      { k: ['tuna','thon'], p: 25 },          // per 100g; "1 can" ≈ 80g
      { k: ['chicken','poulet'], p: 31 },
      { k: ['salmon','saumon'], p: 25 },
      { k: ['egg','oeuf','oeufs','eggs'], p: 6, unit: 'egg', unitG: 55 }, // per egg
      { k: ['oats','flocons'], p: 13 },
      { k: ['edamame'], p: 12 },
      { k: ['tofu'], p: 8 },
      { k: ['lentils','lentilles'], p: 9 },
      { k: ['chickpea','pois chiche','chickpeas'], p: 8 },
      { k: ['nutripure','whey','shake','scoop'], p: 25, unit: 'scoop', unitG: 30 },
      { k: ['bread','pain'], p: 8, unit: 'slice', unitG: 35 },
      { k: ['crackers'], p: 8, unit: 'portion', unitG: 25 },
      { k: ['rice','riz'], p: 3 },
      { k: ['yogurt','yoghurt','yaourt'], p: 6 },
    ];

    let total = 0, matched = false;
    for (const food of FOODS) {
      for (const keyword of food.k) {
        if (!t.includes(keyword)) continue;
        // Look for a number near the keyword: "200g skyr", "skyr 300g", "2 eggs", "1 scoop"
        const re = new RegExp(
          `(\\d+(?:\\.\\d+)?)\\s*(?:g|ml|x)?\\s*(?:of\\s*)?${keyword}|` +
          `${keyword}\\s*(?:breast|fillet|can|cans|scoop|scoops|slice|slices|x|×)?\\s*(\\d+(?:\\.\\d+)?)\\s*(?:g|ml)?`,
          'i'
        );
        const fm = t.match(re);
        if (fm) {
          const amount = parseFloat(fm[1] || fm[2] || (food.unitG || 100));
          // If "can" in context, treat as ~80g
          const ctxStr = fm[0].toLowerCase();
          let grams;
          if (ctxStr.includes('can')) grams = amount * 80;
          else if (food.unit === 'egg' && !ctxStr.includes('g')) grams = amount * (food.unitG || 55);
          else if (food.unit === 'scoop' && !ctxStr.includes('g')) grams = amount * (food.unitG || 30);
          else if (food.unit === 'slice' && !ctxStr.includes('g')) grams = amount * (food.unitG || 35);
          else grams = amount; // treat as grams
          total += (grams / 100) * food.p;
          matched = true;
        } else {
          // Keyword found but no amount — use default serving
          const defaultG = food.unitG || 100;
          total += (defaultG / 100) * food.p;
          matched = true;
        }
        break; // only match this food once
      }
    }
    return matched ? Math.round(total) : null;
  }

      <div style="font-size:11px;color:var(--muted);margin-bottom:14px">Tip: type "2 eggs + skyr 200g" and tap Auto-detect, or enter grams directly.</div>
      <div class="confirm-actions">
        <button class="btn-action" id="mealNoteCancel">Cancel</button>
        <button class="btn-action primary" id="mealNoteSave">Save</button>
      </div>
      ${existingNote ? `<button class="btn-remove" id="mealNoteRemove" style="margin-top:10px;width:100%">Clear override</button>` : ''}
    `;

    const textEl  = document.getElementById('mealNoteText');
    const protEl  = document.getElementById('mealNoteProtein');
    const suggest = document.getElementById('parseSuggestion');

    document.getElementById('parseBtn').addEventListener('click', () => {
      const parsed = parseProteinFromText(textEl.value);
      if (parsed !== null) {
        protEl.value = parsed;
        suggest.textContent = `← detected ${parsed}g`;
      } else {
        suggest.textContent = '← not recognised, enter manually';
      }
    });

    // Auto-parse as user types (debounced)
    let parseTimer;
    textEl.addEventListener('input', () => {
      clearTimeout(parseTimer);
      parseTimer = setTimeout(() => {
        const parsed = parseProteinFromText(textEl.value);
        if (parsed !== null) {
          suggest.textContent = `← ~${parsed}g detected`;
          protEl.value = parsed;
        } else {
          suggest.textContent = '';
        }
      }, 600);
    });

    document.getElementById('mealNoteCancel').addEventListener('click', closeModal);
    document.getElementById('mealNoteSave').addEventListener('click', () => {
      const text   = textEl.value.trim();
      const prot   = parseInt(protEl.value);
      if (!text) { toast('Add a note first'); return; }
      if (isNaN(prot) || prot < 0) { toast('Enter a valid protein amount'); return; }
      closeModal();
      onSave({ text, protein: prot });
    });
    const removeBtn = document.getElementById('mealNoteRemove');
    if (removeBtn) removeBtn.addEventListener('click', () => { closeModal(); onSave(null); });
    document.getElementById('modal').classList.add('show');
  }

  function renderProtein() {
    const root = document.getElementById('mainContent');
    const today = new Date();
    const dow = today.getDay();
    const dateKey = today.toISOString().slice(0, 10);
    const plan = PROTEIN_PLANS[dow];
    const target = (plan.target && typeof plan.target === 'object') ? plan.target : { p: plan.target || 0, c: 0, f: 0 };

    // Migrate per-meal note shape: legacy {text, protein} → {text, p, c, f}
    function migrateNotes(obj) {
      const out = {};
      Object.keys(obj || {}).forEach(k => {
        const n = obj[k] || {};
        if (n.p === undefined && n.protein !== undefined) {
          out[k] = { text: n.text || '', p: n.protein || 0, c: n.c || 0, f: n.f || 0 };
        } else {
          out[k] = { text: n.text || '', p: n.p || 0, c: n.c || 0, f: n.f || 0 };
        }
      });
      return out;
    }

    function getTotals(plan, checked, notes) {
      let p = 0, c = 0, f = 0;
      plan.meals.forEach(m => {
        if (!checked.includes(m.id)) return;
        const n = notes[m.id];
        if (n) { p += n.p || 0; c += n.c || 0; f += n.f || 0; }
        else { p += m.p || 0; c += m.c || 0; f += m.f || 0; }
      });
      return { p, c, f };
    }

    function macroBars(eaten, tgt) {
      const row = (label, e, t, cls) => {
        const pct = t ? Math.min(100, Math.round(e / t * 100)) : 0;
        return `<div class="d-mac-row">
          <div class="d-mac-label">${label}</div>
          <div class="d-mac-bar"><div class="d-mac-fill ${cls}" style="width:${pct}%"></div></div>
          <div class="d-mac-num">${Math.round(e)} / ${t}g</div>
        </div>`;
      };
      return `<div class="d-mac-card">
        ${row('Prot', eaten.p, tgt.p, 'p')}
        ${row('Carb', eaten.c, tgt.c, 'c')}
        ${row('Fat',  eaten.f, tgt.f, 'f')}
      </div>`;
    }

    function getCoachTip(dow) {
      if (dow === 2 || dow === 5) return 'Pre-run today needs ~60g carbs (banana + 40g oats + honey). Hitting only 25g = bonk on intervals.';
      if (dow === 6) return 'Rest day: lower carbs, slightly more fat (almonds, olive oil) for hormones.';
      if (dow === 0) return 'Gym is tonight — carbs concentrated afternoon/evening, lighter fat at night.';
      return 'Gym day — carbs front-loaded around training. Sweet potato is your friend.';
    }

    function renderTodayView(plan, target, dow, dateKey, checked, notes) {
      const eaten = getTotals(plan, checked, notes);
      const dateStr = today.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      const shift = loadDietShift(dateKey);
      const shiftBarHTML = `
        <div class="shift-bar">
          <span class="shift-bar-label">Shift</span>
          <button class="shift-btn ${shift===0?'on':''}" data-shift="0">0</button>
          <button class="shift-btn ${shift===1?'on':''}" data-shift="1">+1h</button>
          <button class="shift-btn ${shift===2?'on':''}" data-shift="2">+2h</button>
          <button class="shift-btn ${shift===3?'on':''}" data-shift="3">+3h</button>
          ${shift !== 0 ? `<span class="shift-status">${shift>0?'+':''}${shift}h</span>` : ''}
        </div>`;
      // Build a mixed list of meals + (optional) session block, sorted by resolved time
      const sess = buildSessionBlock(dateKey, dow, shift);
      const items = plan.meals.map(m => {
        const t = resolveMealTime(m, dateKey, dow, shift);
        return { kind: 'meal', meal: m, time: t, sortMin: _hhmmToMin(t) };
      });
      if (sess) items.push(sess);
      items.sort((a, b) => a.sortMin - b.sortMin);
      const mealsHTML = items.map(it => {
        if (it.kind === 'session') {
          const icon = it.label.startsWith('Run') ? '↗' : `<svg viewBox="0 0 64 32" width="28" height="14" fill="currentColor" aria-hidden="true"><rect x="0" y="6" width="8" height="20" rx="2"/><rect x="9" y="10" width="6" height="12" rx="1"/><rect x="15" y="14" width="34" height="4"/><rect x="49" y="10" width="6" height="12" rx="1"/><rect x="56" y="6" width="8" height="20" rx="2"/></svg>`;
          return `<div class="d-session" data-session="1">
            <div class="d-session-time">${it.startTime}–${it.endTime}</div>
            <div class="d-session-icon">${icon}</div>
            <div class="d-session-body">
              <div class="d-session-label">${it.label}${it.isCustom ? ' ·' : ''}</div>
              <div class="d-session-hint">${it.isCustom ? 'custom · tap to adjust' : 'tap to adjust start time'}</div>
            </div>
            <div class="d-session-edit">EDIT</div>
          </div>`;
        }
        const m = it.meal;
        const done = checked.includes(m.id);
        const note = notes[m.id];
        const dispP = note ? note.p : m.p;
        const dispC = note ? note.c : m.c;
        const dispF = note ? note.f : m.f;
        return `<div class="d-meal ${done ? 'done' : ''} ${note ? 'over' : ''}" data-meal="${m.id}">
          <div class="d-meal-time">${it.time}</div>
          <div class="d-meal-body">
            <div class="d-meal-name">${m.label}</div>
            <div class="d-meal-detail">${note ? note.text : m.detail}</div>
            ${(!note && m.carbs) ? `<div class="d-meal-carb">Carbs: ${m.carbs}</div>` : ''}
            <div class="d-meal-mac">${dispP}P · ${dispC}C · ${dispF}F${note ? ' ✎' : ''}</div>
          </div>
          <div class="d-meal-actions">
            <div class="d-meal-check">${done ? '✓' : ''}</div>
            <button class="d-meal-swap" data-edit-meal="${m.id}" title="Swap or edit this meal">✎</button>
          </div>
        </div>`;
      }).join('');
      return `
        <div class="d-day-header">
          <div class="d-day-type">${plan.type}</div>
          <div class="d-day-date">${dateStr}</div>
        </div>
        ${plan.note ? `<div class="d-coach-tip"><div class="d-coach-tip-label">Coach</div><div>${plan.note}</div></div>` : ''}
        ${macroBars(eaten, target)}
        ${shiftBarHTML}
        <div class="d-meals">${mealsHTML}</div>
        <div class="d-coach-tip"><div class="d-coach-tip-label">Tip</div><div>${getCoachTip(dow)}</div></div>
        <button class="btn-action primary" id="logDietDayBtn" style="width:100%;margin-top:14px">Log day</button>
        <div style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px">
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:12px">Diet log</div>
          ${renderDietHistorySection()}
        </div>`;
    }

    function renderWeekView() {
      const dayLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const order = [1,2,3,4,5,6,0];
      const rows = order.map(d => {
        const p = PROTEIN_PLANS[d];
        const t = (p.target && typeof p.target === 'object') ? p.target : { p: p.target || 0, c: 0, f: 0 };
        const isToday = d === dow;
        return `<div class="d-week-row ${isToday ? 'on' : ''}">
          <div class="d-week-day">${dayLabels[d]}</div>
          <div class="d-week-type">${p.type}</div>
          <div class="d-week-mac"><span>${t.p}P</span><span>${t.c}C</span><span>${t.f}F</span></div>
        </div>`;
      }).join('');
      return `<div class="d-week-wrap">
        <div class="d-week-summary">Average: <b>~235P · 305C · 78F</b> · ~2,580 kcal/day · cut to 102 kg over 3 months</div>
        ${rows}
      </div>`;
    }

    function renderShopView() {
      return `<div class="d-shop-intro">Weekly shopping list — quantities feed all 7 days at the planned macros.</div>` +
        SHOPPING_LIST.map(g => `
          <div class="d-shop-cat">
            <div class="d-shop-cat-name">${g.cat}</div>
            ${g.items.map(it => `<div class="d-shop-item">${it}</div>`).join('')}
          </div>`).join('');
    }

    function renderRulesView() {
      const rulesHTML = KEY_RULES.map((r, i) => `
        <div class="d-rule">
          <div class="d-rule-num">${String(i+1).padStart(2,'0')}</div>
          <div class="d-rule-body">
            <div class="d-rule-title">${r.title}</div>
            <div class="d-rule-text">${r.body}</div>
          </div>
        </div>`).join('');
      const avoidHTML = CARB_AVOID_ON_CUT.map(x => `<span class="d-avoid-chip">${x}</span>`).join('');
      return `<div>
        ${rulesHTML}
        <div class="d-avoid-card">
          <div class="d-avoid-title">Avoid on cut</div>
          <div class="d-avoid-row">${avoidHTML}</div>
          <div class="d-avoid-note">These don't appear in the plan for a reason — pasta and fried carbs are too calorically dense for a cut at 107 → 102 kg.</div>
        </div>
      </div>`;
    }

    const rerender = () => {
      const checked = loadProteinChecked(dateKey);
      const notes   = migrateNotes(loadProteinNotes(dateKey));
      const subtabs = `
        <div class="d-subtabs">
          <button class="d-subtab ${_proteinSubtab==='today'?'on':''}" data-st="today">Today</button>
          <button class="d-subtab ${_proteinSubtab==='week'?'on':''}"  data-st="week">Week</button>
          <button class="d-subtab ${_proteinSubtab==='shop'?'on':''}"  data-st="shop">Shop</button>
          <button class="d-subtab ${_proteinSubtab==='rules'?'on':''}" data-st="rules">Rules</button>
        </div>`;
      let body;
      if      (_proteinSubtab === 'today') body = renderTodayView(plan, target, dow, dateKey, checked, notes);
      else if (_proteinSubtab === 'week')  body = renderWeekView();
      else if (_proteinSubtab === 'shop')  body = renderShopView();
      else                                  body = renderRulesView();

      root.innerHTML = subtabs + `<div class="d-body">${body}</div>`;

      // Sub-tab switches
      root.querySelectorAll('.d-subtab').forEach(b => {
        b.addEventListener('click', () => { _proteinSubtab = b.dataset.st; rerender(); });
      });

      if (_proteinSubtab !== 'today') return;

      // Shift buttons
      root.querySelectorAll('[data-shift]').forEach(btn => {
        btn.addEventListener('click', () => {
          const h = parseInt(btn.dataset.shift, 10) || 0;
          saveDietShift(dateKey, h);
          rerender();
        });
      });

      // Tap session block → time picker
      root.querySelectorAll('[data-session]').forEach(card => {
        card.addEventListener('click', () => {
          openSessionTimeModal(dateKey, dow, () => rerender());
        });
      });

      // Tap meal → toggle checked
      root.querySelectorAll('.d-meal').forEach(card => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.d-meal-edit')) return;
          const id = card.dataset.meal;
          let arr  = loadProteinChecked(dateKey);
          if (arr.includes(id)) arr = arr.filter(x => x !== id);
          else arr.push(id);
          saveProteinChecked(dateKey, arr);
          rerender();
        });
      });

      // Edit a meal (now P + C + F)
      root.querySelectorAll('[data-edit-meal]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const id = btn.dataset.editMeal;
          const meal = plan.meals.find(m => m.id === id);
          if (!meal) return;
          openMealOverrideModal(meal, dateKey, () => {
            // After save: ensure meal is checked
            let arr = loadProteinChecked(dateKey);
            if (!arr.includes(id)) { arr.push(id); saveProteinChecked(dateKey, arr); }
            rerender();
          });
        });
      });

      // Log day
      const logBtn = document.getElementById('logDietDayBtn');
      if (logBtn) logBtn.addEventListener('click', () => {
        const totals = getTotals(plan, loadProteinChecked(dateKey), migrateNotes(loadProteinNotes(dateKey)));
        const entry = { id: 'd_' + Date.now(), date: dateKey, dow, type: plan.type, target, totals };
        const hist = loadJSON('diet_history_v1', []);
        hist.push(entry);
        saveJSON('diet_history_v1', hist);
        toast('Day logged ✓');
        rerender();
      });
    };

    rerender();
  }



  // ── v3: Diet meal-time shift (per-day) ────────────────────────────────
  function loadDietShift(dateKey) { return parseInt(loadJSON('diet_shift_v1:' + dateKey, 0), 10) || 0; }
  function saveDietShift(dateKey, hours) { saveJSON('diet_shift_v1:' + dateKey, hours); }
  function shiftMealTime(timeStr, hours) {
    if (!hours) return timeStr;
    const m = String(timeStr || '').match(/^(\d{1,2}):(\d{2})/);
    if (!m) return timeStr;
    let h = parseInt(m[1], 10) + hours;
    h = ((h % 24) + 24) % 24;
    return h + ':' + m[2];
  }
